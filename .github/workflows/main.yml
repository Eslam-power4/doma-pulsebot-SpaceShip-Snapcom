name: Enterprise Daily Sniper & State Saver

on:
  workflow_dispatch: # زرار التشغيل اليدوي
  schedule:
    - cron: '0 4 * * *' # هيشتغل أوتوماتيك كل يوم الساعة 4 الفجر بتوقيت جرينتش (الصبح بدري عندك)

jobs:
  sniper-mission:
    runs-on: ubuntu-latest
    permissions:
      contents: write # صلاحية إجبارية عشان البوت يقدر يحفظ الشيت ويرفعه تاني للمشروع

    steps:
    - name: 1. Checkout Repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: 2. Set up Python 3.12 Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # تسريع التسطيب جداً

    - name: 3. Install Mission Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 4. Execute Sniper Bot (Stealth Mode)
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        SPACESHIP_API_KEY: ${{ secrets.SPACESHIP_API_KEY }}
        SPACESHIP_API_SECRET: ${{ secrets.SPACESHIP_API_SECRET }}
      run: |
        python bot.py

    - name: 5. Save State & Memory for Tomorrow (Auto-Commit)
      run: |
        git config --global user.name "Sniper-Bot-Automation"
        git config --global user.email "bot@sniper.local"
        # بيسحب الشيت والداتا بيز ويرفعهم عشان البوت يقرأهم بكرا
        git add alerts.db processed_domains.csv || echo "No files to add"
        git commit -m "Auto-save: Update daily domain state [skip ci]" || echo "No changes to commit"
        git push
